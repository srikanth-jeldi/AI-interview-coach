spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth
          uri: http://localhost:8081
          predicates: [ Path=/api/auth/** ]
        - id: profile
          uri: http://localhost:8082
          predicates: [ Path=/api/profile/** ]
        - id: questions
          uri: http://localhost:8083
          predicates: [ Path=/api/questions/**,/api/technologies/** ]
        - id: mock
          uri: http://localhost:8084
          predicates: [ Path=/api/interviews/** ]
        - id: analytics
          uri: http://localhost:8085
          predicates: [ Path=/api/analytics/** ]
        - id: jobs
          uri: http://localhost:8086
          predicates: [ Path=/api/jobs/** ]
management:
  endpoints.web.exposure.include: health,info
